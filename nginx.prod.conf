server {
    listen 80;
    server_name sweet-case.pp.ua www.sweet-case.pp.ua;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name sweet-case.pp.ua www.sweet-case.pp.ua;

    ssl_certificate /etc/letsencrypt/live/sweet-case.pp.ua/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sweet-case.pp.ua/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    # Блокуємо приховані файли й каталоги всюди в URI:
    # /.env, /api/.env, /config/.env, /.git/config, /public/.git/config, /.aws/credentials ...
    location ~ (^|/)\.(env|git|svn|hg|bzr|aws)(/|$) {
        return 403;
    }

    # Часті сміттєві endpoint-и
    location = /wp-login.php {
        return 404;
    }

    location = /xmlrpc.php {
        return 404;
    }

    location = /wlwmanifest.xml {
        return 404;
    }

    location = /phpinfo.php {
        return 404;
    }

    location = /info.php {
        return 404;
    }

    # Додаткові debug/info шляхи з логів
    location = /phpinfo {
        return 404;
    }

    location = /info {
        return 404;
    }

    location = /_profiler/phpinfo {
        return 404;
    }

    location = /_profiler/phpinfo.php {
        return 404;
    }

    location = /php_info.php {
        return 404;
    }

    location = /submit_order {
        proxy_pass http://backend:8000/submit_order;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /docs {
        proxy_pass http://backend:8000/docs;
        proxy_set_header Host $host;
    }

    location = /openapi.json {
        proxy_pass http://backend:8000/openapi.json;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}