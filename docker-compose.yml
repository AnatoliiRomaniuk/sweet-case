services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
  db:
    image: postgres:15-alpine
    container_name: sweet_case_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: sweet_case
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: sweet_case_backend
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/sweet_case
#    ports:
#    - "8000:8000"

  frontend:
      build: ./frontend
      ports:
        - "5173:5173"  # Тепер ми відкриваємо цей порт для світу
      volumes:
        - ./frontend:/app
        - /app/node_modules # Щоб Docker не затирав встановлені пакети
      environment:
        - VITE_API_URL=http://localhost:8000

volumes:
  postgres_data:
