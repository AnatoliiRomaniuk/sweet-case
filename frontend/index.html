<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Document</title>
   <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="order-form">
    <h2>🎂 Замовити тортик</h2>
    <input type="text" id="name" placeholder="Ваше ім'я" required>
    <select id="cake">
        <option value="Наполеон">Наполеон</option>
        <option value="Київський">Київський</option>
        <option value="Медовик">Медовик</option>
    </select>
    <input type="number" id="weight" placeholder="Вага (кг)" step="0.5" min="0.5">
    <button onclick="sendOrder()">Відправити замовлення</button>
    <script src="js/scripts.js"></script>
</div>
</body>
</html>
